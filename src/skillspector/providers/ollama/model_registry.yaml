# Bundled with the package; consulted whenever the active provider is
# OllamaProvider.
#
# Format:
#   models:
#     "<model-label>":
#       context_length: <int>          # total context window in tokens (required)
#       max_output_tokens: <int>       # model's max output cap (optional)

